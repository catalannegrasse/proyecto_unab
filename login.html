<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administración - UNAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0d233a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            border: none;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
        }
        .btn-login {
            background-color: #0d233a;
            color: white;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background-color: #1a3a5f;
            color: white;
        }
    </style>
</head>
<body>

    <div class="card-login">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">Panel de Control</h3>
            <p class="text-muted small">Ingreso exclusivo para administradores</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger p-2 small text-center" role="alert">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label small fw-semibold text-secondary">Usuario</label>
                <input type="text" class="form-control" id="username" name="username" required placeholder="">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label small fw-semibold text-secondary">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" required placeholder="">
            </div>
            <button type="submit" class="btn btn-login w-100 py-2 mt-2">Iniciar Sesión</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="/" class="text-decoration-none small text-secondary">← Volver al Inicio</a>
        </div>
    </div>

</body>
</html>
